/*
  CSS do Kanban Família Engel
  -----------------------------------------
  Este arquivo é apenas uma CÓPIA do CSS que já está embutido
  dentro do kanban-familia-engel.html (dentro da tag <style>).
  Ele NÃO é carregado pelo app — é só para referência.
*/

/*
===============================================
KANBAN MODERN UI
Versão: 1.0
Inspirado em:
- Trello
- ClickUp
- Linear
- Notion

Criado para:
Kanban Família Engel
===============================================
*/

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
    /* ===== PRIMARY ===== */
    --primary:#5B7CFA;
    --primary-hover:#4868E7;
    --primary-active:#3A54C4;
    --primary-disabled:#C2CDF8;

    /* ===== NEUTRALS / SURFACES ===== */
    --bg:#F6F8FC;
    --surface:#FFFFFF;
    --surface-2:#FAFBFD;
    --surface-3:#F2F5FA;
    --surface-elevation-1: var(--surface);
    --surface-elevation-2: var(--surface-2);
    --surface-elevation-3: var(--surface-3);
    --card-bg: var(--surface);
    --border:#E5EAF2;
    --border-hover:#D6DEE8;
    --divider:#EDEFF5;
    --hover-bg: rgba(15,23,42,.035);
    --overlay: rgba(15,23,42,.35);

    /* ===== TEXT LEVELS ===== */
    --text:#23272F;
    --text-secondary:#4B5568;
    --text-light:#697586;
    --text-muted:#9AA5B1;
    --text-disabled:#C3CAD6;
    --text-placeholder:#ADB5C4;
    --text-inverse:#FFFFFF;

    /* ===== STATES: SUCCESS / WARNING / DANGER / INFO / NEUTRAL ===== */
    --success:#1FA463; --success-bg:#E6F7EF; --success-border:#A9E4C6; --success-hover:#178F55;
    --warning:#D98A1A; --warning-bg:#FDF3E2; --warning-border:#F3D48F; --warning-hover:#BC7712;
    --danger:#E5484D;  --danger-bg:#FCEBEC;  --danger-border:#F5B8BA;  --danger-hover:#C93A3F;
    --info:#2E7BD6;    --info-bg:#E8F1FC;    --info-border:#A9CDF0;    --info-hover:#1F63B0;
    --neutral:#6B7280; --neutral-bg:#F1F2F5; --neutral-border:#D8DCE3; --neutral-hover:#565D6B;

    /* ===== KANBAN / LABEL PALETTE (9 cores) — cada uma com main / light / dark ===== */
    --blue:#4C6EF5;      --blue-light:#E3E8FF;      --blue-dark:#2E45B8;
    --purple:#8B5CF6;    --purple-light:#EDE4FF;    --purple-dark:#5B32C9;
    --pink:#EC4899;      --pink-light:#FCE1EE;      --pink-dark:#B22D6C;
    --red:#EF4444;       --red-light:#FCE4E4;       --red-dark:#B32323;
    --orange:#F97316;    --orange-light:#FEE9D6;    --orange-dark:#B85A0F;
    --yellow:#EAB308;    --yellow-light:#FBF0CE;    --yellow-dark:#9C7A05;
    --green:#22C55E;     --green-light:#DDF5E6;     --green-dark:#157A3D;
    --turquoise:#14B8A6; --turquoise-light:#D7F5F1; --turquoise-dark:#0D7A6E;
    --gray:#64748B;      --gray-light:#E7EAEF;      --gray-dark:#3F4A5C;

    /* ===== GLASS / OVERLAY (usados em sidebar, colunas e botões translúcidos) ===== */
    --sidebar-bg: rgba(255,255,255,.72);
    --column-bg: rgba(255,255,255,.70);
    --glass-btn-bg: rgba(255,255,255,.85);
    --glass-btn-bg-soft: rgba(255,255,255,.45);

    /* ===== SHADOWS ===== */
    --shadow-xs: 0 1px 2px rgba(0,0,0,.03);
    --shadow-sm: 0 4px 12px rgba(15,23,42,.05);
    --shadow-md: 0 10px 24px rgba(15,23,42,.08);
    --shadow-lg: 0 18px 45px rgba(15,23,42,.14);
    --shadow-xl: 0 30px 70px rgba(15,23,42,.18);

    /* ===== OPACITY TOKENS ===== */
    --opacity-glass: .70;
    --opacity-overlay: .35;
    --opacity-hover: .06;
    --opacity-focus: .15;
    --opacity-dropdown-shadow: .18;
    --opacity-modal-shadow: .18;
    --opacity-tooltip-bg: .92;

    /* ===== RADIUS / MOTION ===== */
    --radius-xs:8px;
    --radius-sm:12px;
    --radius-md:16px;
    --radius-lg:20px;
    --radius-xl:28px;
    --transition:.25s cubic-bezier(.2,.8,.2,1);
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(circle at 12% -8%, rgba(76,110,245,.07), transparent 42%),
      radial-gradient(circle at 100% 0%, rgba(201,124,109,.09), transparent 42%),
      radial-gradient(circle at 100% 100%, rgba(34,197,94,.05), transparent 42%),
      var(--bg);
    background-attachment:fixed;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
}
body.dark{
    background:
      radial-gradient(circle at 12% -8%, rgba(107,140,255,.10), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(201,124,109,.12), transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(61,214,140,.07), transparent 45%),
      var(--bg);
    background-attachment:fixed;
}

::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:#CFD8E3; border-radius:30px; transition:.2s; }
::-webkit-scrollbar-thumb:hover{ background:#B7C2CF; }

a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; transition:var(--transition); }
input, textarea, select{ font-family:inherit; }

main{ max-width:1400px; margin:0 auto; padding-bottom:80px; flex: 1; min-width: 0; }

.app-shell{ display:flex; min-height:100vh; align-items:flex-start; }

.sidebar{
    width:240px; flex-shrink:0;
    background:var(--sidebar-bg);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-right:1px solid var(--border);
    height:100vh; position:sticky; top:0;
    display:flex; flex-direction:column;
    padding:24px 14px;
}
.sidebar-brand{ padding:6px 10px 22px; }
.sidebar-brand h1{ font-size:17px; font-weight:700; letter-spacing:-0.02em; color:var(--text); line-height:1.3; }

.sidebar-nav{ display:flex; flex-direction:column; gap:3px; flex:1; overflow-y:auto; }
.sidebar-nav button{
    all:unset; cursor:pointer; display:flex; align-items:center; gap:11px;
    padding:10px 10px 10px 9px; border-radius:12px; color:var(--text-light);
    font-size:14px; font-weight:600; transition:var(--transition);
    border-left:3px solid transparent; white-space:nowrap;
}
.sidebar-nav button:hover{ background:var(--surface-3); color:var(--text); }
.sidebar-nav button.active{ background:var(--surface-3); color:var(--text); border-left-color:var(--tab-color,var(--primary)); }
.sidebar-icon{
    width:26px; height:26px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface-3); color:var(--text-light);
}
.sidebar-icon svg{ width:15px; height:15px; stroke:currentColor; }

.sidebar-footer{ display:flex; flex-direction:column; gap:10px; padding:14px 10px 4px; border-top:1px solid var(--border); margin-top:10px; }

.user-badge{
    background:var(--surface); border:1px solid var(--border); border-radius:999px;
    padding:9px 14px; box-shadow:var(--shadow-xs); cursor:pointer; transition:var(--transition);
    font-size:13px; text-align:left; width: 100%;
}
.user-badge:hover{ transform:translateY(-2px); box-shadow:var(--shadow-sm); }

.sync-status{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text-light); padding:0 4px; }
.sync-dot{ width:9px; height:9px; border-radius:50%; background:#32D583; box-shadow: 0 0 8px rgba(50,213,131,.4); flex-shrink:0; }
.sync-dot.saving{ background:#FDB022; }
.sync-dot.error{ background:#F04438; }

.board-inner{ padding:32px; }

.filter-bar{ display:flex; margin-bottom:22px; }
.filter-trigger-btn{
    all:unset; cursor:pointer; display:flex; align-items:center; gap:8px;
    padding:9px 16px; border-radius:10px; background:var(--surface); border:1px solid var(--border);
    color:var(--text-light); font-size:13.5px; font-weight:600; transition:var(--transition);
    box-shadow:var(--shadow-xs);
}
.filter-trigger-btn:hover{ border-color:var(--border-hover); color:var(--text); }
.filter-trigger-btn.active{ border-color:var(--primary); color:var(--primary); background:rgba(91,124,250,.14); }
.filter-trigger-badge{
    display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px;
    padding:0 5px; border-radius:999px; background:var(--primary); color:white; font-size:11px; font-weight:700;
}
.filter-trigger-badge:empty{ display:none; }

.filter-popover{ width:300px; max-height:70vh; }
.filter-popover-body{ overflow-y:auto; }
.filter-group{ margin-bottom:16px; }
.filter-group-label{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:8px; }
.filter-checkbox-row{
    display:flex; align-items:center; gap:9px; padding:7px 4px; font-size:13.5px; color:var(--text);
    cursor:pointer; border-radius:8px; transition:var(--transition);
}
.filter-checkbox-row:hover{ background:var(--surface-3); }
.filter-checkbox-row input[type=checkbox]{ width:16px; height:16px; accent-color:var(--primary); flex-shrink:0; }
.filter-icon{ font-size:14px; flex-shrink:0; }
.filter-label-pill{ font-size:12px; font-weight:700; padding:4px 10px; border-radius:6px; }
.filter-hint{ font-size:11.5px; color:var(--text-muted); margin-top:4px; }
.filter-popover .popover-search{ margin-bottom:0; }

.board-banner{
    position:relative; overflow:hidden; display:flex; align-items:center; gap:14px;
    padding:16px 24px; margin-bottom:24px; border-radius:18px; min-height:auto;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    box-shadow: 0 10px 26px rgba(0,0,0,.10);
}
.board-banner::before{ content:""; position:absolute; width:220px; height:220px; right:-90px; top:-100px; border-radius:50%; background: rgba(255,255,255,.10); }
.board-banner::after{ content:""; position:absolute; width:120px; height:120px; bottom:-60px; left:-30px; border-radius:50%; background: rgba(255,255,255,.08); }
.board-banner .icon{ width:40px; height:40px; border-radius:12px; background: rgba(255,255,255,.18); display:flex; justify-content:center; align-items:center; backdrop-filter:blur(10px); z-index:2; flex-shrink:0; }
.board-banner .icon svg{ width:20px; height:20px; stroke:white; }
.board-banner h1{ color:white; font-size:20px; font-weight:700; margin-bottom:2px; position:relative; z-index:2; }
.board-banner .subtitle{ color:rgba(255,255,255,.85); font-size:13px; opacity:.85; position:relative; z-index:2; }

.overview-wrap{ padding:32px; }
.overview-board{ margin-bottom:42px; }

.overview-board-header{
    display:flex; align-items:center; gap:18px; background:var(--surface); border-radius:20px;
    padding:18px 22px; border:1px solid var(--border); box-shadow:var(--shadow-sm);
    cursor:pointer; transition:var(--transition);
}
.overview-board-header:hover{ transform:translateY(-3px); box-shadow:var(--shadow-md); }
.overview-board-header .icon{
    width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color:white;
}
.overview-board-header .icon svg{ width:24px; height:24px; stroke:white; }
.overview-board-header h2{ font-size:18px; font-weight:700; color:var(--text); }
.overview-board-header .go{ margin-left:auto; color:var(--text-light); font-size:13px; font-weight:600; }

.mini-columns{ display:flex; gap:18px; overflow-x:auto; padding-top:18px; padding-bottom:10px; }
.mini-column{ width:260px; flex-shrink:0; }
.mini-column .name{ font-size:12px; font-weight:700; letter-spacing:.08em; color:var(--text-muted); text-transform:uppercase; margin-bottom:12px; padding-left:4px; }

.mini-card{
    background:var(--surface); border:none; border-radius:16px;
    padding:0; margin-bottom:10px; box-shadow:var(--shadow-xs); transition:var(--transition);
    overflow:hidden;
}
.mini-card:hover{ transform: translateY(-3px); box-shadow:var(--shadow-md); }
.mini-card-content{ padding:10px 12px; }
.mini-card .meta-row{ margin-top:8px; }

.board-columns{ display:flex; align-items:flex-start; gap:22px; overflow-x:auto; padding-bottom:20px; padding-top:4px; }

.column{
    width:310px; min-height:120px; flex-shrink:0; display:flex; flex-direction:column;
    border-radius:22px; background:var(--column-bg);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.55);
    box-shadow: 0 10px 35px rgba(15,23,42,.05);
    transition:var(--transition);
    position:relative;
}
.column:hover{ transform:translateY(-2px); }
.column.drag-over{ border:2px dashed var(--primary); box-shadow: 0 0 0 6px rgba(91,124,250,.08); }

.column-header{ display:flex; align-items:center; justify-content:space-between; padding:18px 18px 8px; background:transparent; border:none; border-bottom:1px solid rgba(0,0,0,.06); margin:0; }
.column-header-right{ display:flex; align-items:center; gap:8px; }
.column-header .name{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--accent-dark); }
.column-header .count{
    background:var(--surface-3); color:var(--text); min-width:28px; height:28px; padding:0 10px;
    border-radius:999px; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; border:1px solid var(--border); box-shadow:var(--shadow-xs);
}

.col-menu-btn{
    all:unset; cursor:pointer; width:32px; height:32px; border-radius:10px; display:flex;
    align-items:center; justify-content:center; color:var(--text-light); transition:var(--transition);
}
.col-menu-btn:hover{ background:var(--surface-3); box-shadow:var(--shadow-xs); color:var(--text); }

.card-list{ padding: 0 14px 14px; min-height:40px; }

.empty-hint{ background:var(--surface); border:2px dashed var(--border); border-radius:16px; padding:20px; color:var(--text-muted); font-size:13px; text-align:center; }

.card{
    background:var(--surface); border:none; border-radius:16px; padding:0; margin-bottom:14px;
    cursor:grab; position:relative; overflow:hidden;
    box-shadow: 0 8px 20px rgba(15,23,42,.06);
    transition: transform .25s, box-shadow .25s, opacity .25s;
    touch-action: none; -webkit-touch-callout: none; user-select: none;
}
.card::after{
    content:""; position:absolute; top:-120%; left:-40%; width:40px; height:220%;
    transform:rotate(25deg); background: rgba(255,255,255,.35); transition:.7s; pointer-events:none;
}
.card:hover::after{ left:130%; }
.card:hover{ transform: translateY(-5px) scale(1.015); box-shadow: 0 18px 38px rgba(15,23,42,.13); }
.card:active{ cursor:grabbing; }
.card.dragging{ opacity:.35; }

.card-ghost{ position:fixed; pointer-events:none; z-index:9999; border-radius:16px; box-shadow: 0 25px 55px rgba(0,0,0,.25); overflow:hidden; }

.card-menu-btn{
    all:unset; cursor:pointer; position:absolute; top:8px; right:8px; z-index:2;
    width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    border-radius:6px; color:var(--text-light); font-weight:700; font-size:14px; line-height:1;
    background:var(--glass-btn-bg); opacity:.5; transition:opacity .15s ease, background .15s ease;
}
.card:hover .card-menu-btn{ opacity:1; }
.card-menu-btn:hover{ background:var(--surface-3); color:var(--text); }

.card-label-bar{ height:6px; width:100%; flex-shrink:0; }
.card-content{ padding:12px 14px; }

.card .title{ font-size:15px; font-weight:700; color:var(--text); line-height:1.5; }

.card .meta-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }

.meta-pill{
    display:flex; align-items:center; gap:6px; padding: 6px 10px; border-radius:999px;
    background: var(--surface-3); font-size:12px; font-weight:600; color:var(--text-light);
}
.meta-pill.due-pill{ background:var(--warning-bg); color:var(--warning-hover); }
.meta-pill.due-pill.overdue{ background:var(--danger-bg); color:var(--danger-hover); }

.add-card-btn{
    all:unset; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    margin: 4px 14px 14px; padding:14px; border-radius:14px; border:2px dashed var(--border);
    background:var(--surface); color:var(--text-light); font-weight:600; transition:var(--transition);
}
.add-card-btn:hover{ border-color:var(--primary); background:var(--surface-2); color:var(--primary); }

.add-column-btn{
    all:unset; cursor:pointer; width:280px; flex-shrink:0; padding:22px; border-radius:22px;
    border:2px dashed var(--border); background:var(--glass-btn-bg-soft); backdrop-filter:blur(10px);
    color:var(--text-light); font-weight:700; transition:var(--transition); height: fit-content;
}
.add-column-btn:hover{ background:var(--surface); transform:translateY(-4px); box-shadow:var(--shadow-md); border-color:var(--primary); color:var(--primary); }

.column-menu{
    position:fixed; border:none; border-radius:18px; padding:10px;
    background:var(--surface); box-shadow: 0 25px 60px rgba(15,23,42,.18);
    display:flex; flex-direction:column; min-width:200px; z-index:10000;
    animation:dropdownOpen .18s ease; transform-origin:top right;
}
.column-menu button{ all:unset; box-sizing:border-box; cursor:pointer; padding:10px 14px; border-radius:12px; transition:var(--transition); display:flex; align-items:center; gap:10px; width:100%; font-size:13px; font-weight:600; text-align:left; color:var(--text); }
.column-menu button:hover{ background:var(--surface-3); }
.column-menu button.danger{ color:var(--danger); }
.column-menu-divider{ height:1px; margin:10px 0; background:var(--border); }
.column-menu-label{ padding:6px 12px; color:var(--text-muted); text-transform:uppercase; font-size:11px; letter-spacing:.08em; }

.column-menu-swatches{ display:flex; flex-wrap:wrap; gap:10px; padding:10px 12px; }
.column-menu-swatches .swatch{ width:24px; height:24px; transition:var(--transition); }
.column-menu-swatches .swatch:hover{ transform:scale(1.18); }
.column-menu-swatches .swatch.selected{ border:3px solid white; box-shadow: 0 0 0 2px var(--text); }

.modal-backdrop{
    position:fixed; inset:0; display:flex; justify-content:center; align-items:flex-start;
    overflow-y:auto; padding:40px 20px; background:rgba(15,23,42,.35);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    animation:fadeBackdrop .25s ease; z-index:9999;
}

.modal{
    width:90vw; max-width:900px; background:var(--surface); border-radius:20px; padding:0;
    border:1px solid rgba(255,255,255,.65); box-shadow: 0 30px 70px rgba(15,23,42,.18);
    animation:modalOpen .28s ease;
    display:flex; flex-direction:row; position:relative;
    max-height:85vh;
}

.card-modal-main{ flex:3; padding:26px; overflow-y:auto; max-height:85vh; min-width:0; }
.card-modal-sidebar{
    flex:2; min-width:280px; border-left:1px solid var(--border); padding:22px; background:var(--surface-2);
    overflow-y:auto; max-height:85vh; display:flex; flex-direction:column;
    border-radius:0 20px 20px 0;
}

@media (max-width:768px){
    .modal{ flex-direction:column; width:94vw; max-width:94vw; max-height:88vh; }
    .card-modal-main{ max-height:none; }
    .card-modal-sidebar{ border-left:none; border-top:1px solid var(--border); max-height:none; border-radius:0 0 20px 20px; }
}

.modal-close{
    all:unset; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; border-radius:10px; color:var(--text-light); transition:var(--transition);
    position:absolute; top:14px; right:14px; z-index:5; background:var(--surface);
}
.modal-close:hover{ background:var(--surface-3); color:var(--text); }

.modal .title-input{
    width:100%; border:none; background:transparent; font-size:21px; font-weight:700;
    color:var(--text); margin-bottom:6px; letter-spacing:-0.5px; padding: 4px 0;
}
.modal .title-input:focus{ outline:none; }
.modal .title-input::placeholder{ color:#B4BDC9; }

.card-authorship{
    display:inline-flex; align-items:center; gap:8px; padding:5px 12px; border-radius:999px;
    background:var(--surface-3); color:var(--text-light); font-size:12px; margin-bottom:16px;
}

.modal-section{ margin-top:20px; }
.section-label{ font-size:11px; text-transform:uppercase; letter-spacing:.10em; color:var(--text-muted); font-weight:700; margin-bottom:8px; }
.section-hint{ color:var(--text-light); font-size:12.5px; margin-bottom:8px; }

.modal input[type=text], .modal input[type=date], .modal textarea, .modal select{
    width:100%; border:1px solid var(--border); background:var(--surface-2); border-radius:12px;
    padding:10px 13px; font-size:13.5px; transition:var(--transition);
}
.modal textarea{ min-height:70px; resize:vertical; }
.modal input:focus, .modal textarea:focus, .modal select:focus{
    outline:none; border-color:var(--primary); background:var(--surface); box-shadow: 0 0 0 4px rgba(91,124,250,.12);
}

.inline-add{ display:flex; gap:12px; margin-top:12px; }
.inline-add input{ flex:1; }
.inline-add button, .modal-primary-btn{
    all:unset; cursor:pointer; background:var(--primary); color:white; padding:13px 22px;
    border-radius:14px; font-weight:700; transition:var(--transition); text-align:center;
}
.inline-add button:hover, .modal-primary-btn:hover{ background:var(--primary-hover); transform:translateY(-2px); box-shadow:var(--shadow-md); }

.checklist-progress-row{ display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.checklist-progress-row span{ font-size:13px; font-weight:600; color:var(--text-light); }
.checklist-progress-bar{ flex:1; height:10px; border-radius:999px; overflow:hidden; background:var(--surface-3); }
.checklist-progress-bar .fill{ height:100%; border-radius:999px; background:var(--success); transition:.35s; }

.checklist-item{ display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:8px; border-radius:14px; transition:var(--transition); }
.checklist-item:hover{ background:var(--surface-3); }
.checklist-item input[type=checkbox]{ width:18px; height:18px; accent-color:var(--primary); }
.checklist-item span{ flex:1; font-size:14px; }
.checklist-item span.done{ color:var(--text-muted); text-decoration:line-through; }

.label-list{ display:flex; flex-direction:column; gap:10px; }

.label-row-item{ display:flex; align-items:center; gap:12px; padding:14px; border-radius:14px; transition:var(--transition); cursor: pointer; }
.label-row-item:hover{ background:var(--surface-3); }
.label-row-item.unselected{ opacity:.45; }
.label-row-item.unselected:hover{ opacity:.85; }

.label-check{ width:22px; height:22px; border-radius:8px; }

.swatch-row{ display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; }
.swatch{ width:28px; height:28px; border-radius:50%; border:3px solid transparent; transition:var(--transition); cursor:pointer; padding: 0; }
.swatch:hover{ transform:scale(1.15); }
.swatch.selected{ border-color:#23272F; }

.attachment-item{ display:flex; align-items:center; gap:12px; padding:12px; border-radius:14px; transition:var(--transition); }
.attachment-item:hover{ background:var(--surface-3); }
.attachment-item a{ flex:1; color:var(--primary); font-weight:600; }

.modal-footer{ display:flex; justify-content:space-between; align-items:center; margin-top:34px; padding-top:24px; border-top:1px solid var(--border); }

.delete-card-btn{ all:unset; cursor:pointer; color:var(--danger); font-weight:700; transition:var(--transition); }
.delete-card-btn:hover{ color:var(--danger-hover); }

.file-upload-label{
    cursor:pointer; display:inline-flex; align-items:center; gap:10px; padding:12px 18px;
    border-radius:14px; border:2px dashed var(--border); transition:var(--transition);
}
.file-upload-label:hover{ border-color:var(--primary); color:var(--primary); background:#F7F9FF; }

@keyframes modalOpen{ from{ opacity:0; transform: translateY(25px) scale(.96); } to{ opacity:1; transform: translateY(0) scale(1); } }
@keyframes fadeBackdrop{ from{ opacity:0; } to{ opacity:1; } }

.loading-msg, .empty-state{ display:flex; justify-content:center; align-items:center; flex-direction:column; gap:14px; padding:80px 20px; color:var(--text-muted); font-size:15px; }

/* ---------- Settings page ---------- */
.settings-wrap{ padding:32px 40px; max-width:640px; }
.settings-title{ font-size:24px; font-weight:700; color:var(--text); margin-bottom:28px; }
.settings-section{ margin-bottom:32px; padding-bottom:32px; border-bottom:1px solid var(--border); }
.settings-section:last-child{ border-bottom:none; }
.settings-toggle-row{ display:flex; align-items:center; gap:10px; font-size:14px; font-weight:500; color:var(--text); cursor:pointer; }
.settings-toggle-row input[type=checkbox]{ width:36px; height:20px; accent-color:var(--primary); cursor:pointer; }
.settings-board-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.settings-board-color{ width:16px; height:16px; border-radius:50%; flex-shrink:0; }
.settings-board-name{
    flex:1; height:40px; border:1px solid var(--border); border-radius:10px; padding:0 12px;
    font-size:13.5px; font-family:inherit; background:var(--surface-2); transition:var(--transition);
}
.settings-board-name:focus{ outline:none; border-color:var(--primary); background:var(--surface); }
.settings-save-status{ font-size:12px; color:var(--success); font-weight:600; min-width:44px; }

/* ---------- Auth gate ---------- */
.auth-gate{
    display:flex; align-items:center; justify-content:center; min-height:100vh;
    padding:20px;
    background:
      radial-gradient(circle at 18% 18%, rgba(76,110,245,.14), transparent 48%),
      radial-gradient(circle at 82% 78%, rgba(201,124,109,.16), transparent 48%),
      var(--bg);
}
.auth-card{
    width:100%; max-width:380px; background:var(--surface); border-radius:20px;
    padding:36px 32px; box-shadow:var(--shadow-lg); text-align:center;
}
.auth-card h1{ font-size:20px; font-weight:700; color:var(--text); margin-bottom:8px; }
.auth-card p{ font-size:13.5px; color:var(--text-light); margin-bottom:20px; }
.auth-card input[type=email]{
    width:100%; height:44px; border:1px solid var(--border); border-radius:12px;
    padding:0 14px; font-size:14px; font-family:inherit; background:var(--surface-2);
    color:var(--text); margin-bottom:12px; transition:var(--transition);
}
.auth-card input[type=email]:focus{ outline:none; border-color:var(--primary); background:var(--surface); box-shadow:0 0 0 4px rgba(91,124,250,.12); }
.auth-status{ font-size:12.5px; margin-top:12px; color:var(--text-muted); min-height:18px; }
.auth-status.success{ color:var(--success); }
.auth-status.error{ color:var(--danger); }

/* ---------- Undo toast ---------- */
.undo-toast{
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    background:var(--text); color:var(--text-inverse); padding:13px 16px 13px 20px;
    border-radius:12px; display:flex; align-items:center; gap:16px; font-size:13.5px;
    box-shadow:var(--shadow-lg); z-index:10001; animation:toastIn .25s ease;
}
@keyframes toastIn{ from{ opacity:0; transform:translateX(-50%) translateY(10px); } to{ opacity:1; transform:translateX(-50%) translateY(0); } }
.undo-toast button{
    all:unset; cursor:pointer; font-weight:700; color:var(--primary-hover); padding:4px 8px; border-radius:6px;
    background:rgba(255,255,255,.12); transition:var(--transition);
}
.undo-toast button:hover{ background:rgba(255,255,255,.2); }

/* ---------- Trash page ---------- */
.trash-header-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.trash-header-row .settings-title{ margin-bottom:0; }
.trash-item{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 4px; border-bottom:1px solid var(--divider);
}
.trash-item:last-child{ border-bottom:none; }
.trash-item-info{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.trash-item-title{ font-size:14px; font-weight:600; color:var(--text); }
.trash-item-meta{ font-size:12px; font-weight:500; color:var(--text-muted); margin-left:4px; }
.trash-item-date{ font-size:12px; color:var(--text-muted); margin-top:2px; }
.trash-item-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }

.label-edit-actions{ display:flex; gap:10px; }
.label-edit-actions button{
    all:unset; cursor:pointer; padding:9px 16px; border-radius:12px; background:var(--surface-3);
    font-size:13px; font-weight:600; transition:var(--transition);
}
.label-edit-actions button:hover{ transform:translateY(-2px); box-shadow:var(--shadow-sm); }
.label-edit-actions .danger{ color:var(--danger); }

.new-label-block{ margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
.new-label-block input{ margin-bottom:14px; }

/* ---------- Label chips (compact, Trello-style) ---------- */
.label-chips-row{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.label-pill{ font-size:12px; font-weight:700; padding:6px 12px; border-radius:6px; }
.add-label-btn{
    all:unset; cursor:pointer; width:30px; height:30px; display:flex; align-items:center;
    justify-content:center; border-radius:8px; background:var(--surface-3); color:var(--text-light);
    font-size:16px; font-weight:700; transition:var(--transition);
}
.add-label-btn:hover{ background:var(--border-hover); color:var(--text); }

/* ---------- Floating popovers (labels, card quick-menu) ---------- */
.label-popover{
    position:fixed; z-index:10000; background:var(--surface); border-radius:14px;
    box-shadow: 0 25px 60px rgba(15,23,42,.18); padding:16px; width:290px;
    max-height:60vh; display:flex; flex-direction:column;
    animation:dropdownOpen .18s ease;
}
.popover-header{
    display:flex; align-items:center; justify-content:space-between; font-size:12px;
    font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em;
    margin-bottom:10px; flex-shrink:0;
}
.popover-close-btn{ all:unset; cursor:pointer; color:var(--text-light); padding:3px 7px; border-radius:6px; }
.popover-close-btn:hover{ background:var(--surface-3); color:var(--text); }
.popover-search{
    width:100%; height:38px; border:1px solid var(--border); border-radius:10px; padding:0 12px;
    font-size:13px; margin-bottom:10px; background:var(--surface-2); flex-shrink:0;
}
.popover-search:focus{ outline:none; border-color:var(--primary); background:var(--surface); }
.label-popover .label-list{ overflow-y:auto; flex:1; margin-bottom:8px; min-height:40px; }
.label-popover .new-label-block{ flex-shrink:0; }

/* ---------- Assignees (responsáveis) ---------- */
.assignee-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.assignee-chip{
    display:flex; align-items:center; gap:6px; padding:5px 6px 5px 10px;
    border-radius:999px; background:var(--surface-3); font-size:13px; font-weight:600; color:var(--text);
}
.assignee-chip .avatar{
    width:20px; height:20px; border-radius:50%; background:var(--primary); color:white;
    display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0;
}
.assignee-chip .remove-btn{ all:unset; cursor:pointer; opacity:.55; font-size:13px; padding:2px 4px; transition:var(--transition); }
.assignee-chip .remove-btn:hover{ opacity:1; color:var(--danger); }

/* ---------- Comments ---------- */
.comment-list{ display:flex; flex-direction:column; gap:12px; margin-bottom:12px; flex:1; overflow-y:auto; min-height:60px; }
.comment-item{ display:flex; gap:10px; }
.comment-avatar{
    width:28px; height:28px; border-radius:50%; background:var(--primary); color:white;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;
}
.comment-body{ flex:1; background:var(--surface-3); border-radius:14px; padding:9px 13px; }
.comment-meta{ display:flex; align-items:baseline; gap:8px; margin-bottom:2px; }
.comment-author{ font-size:13px; font-weight:700; color:var(--text); }
.comment-time{ font-size:11px; color:var(--text-muted); }
.comment-text{ font-size:13.5px; color:var(--text); line-height:1.5; white-space:pre-wrap; }
.comment-empty{ font-size:13px; color:var(--text-muted); padding:6px 0 12px; }

.comment-composer{ display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
.comment-composer textarea{
    width:100%; min-height:76px; resize:vertical; font-family:inherit; font-size:13.5px;
    border:1px solid var(--border); border-radius:12px; padding:10px 13px;
    background:var(--surface); transition:var(--transition);
}
.comment-composer textarea:focus{
    outline:none; border-color:var(--primary); box-shadow: 0 0 0 4px rgba(91,124,250,.12);
}
.comment-composer button{ align-self:flex-end; }

.del-btn{ all: unset; cursor: pointer; opacity:.55; transition:var(--transition); padding: 3px 7px; border-radius: 6px; }
.del-btn:hover{ opacity:1; color:var(--danger); }

button:hover{ transition:var(--transition); }
input{ transition:var(--transition); }
textarea{ transition:var(--transition); }
select{ transition:var(--transition); }

.overview-board-header, .column, .filter-bar input{ backdrop-filter:blur(12px); }

::selection{ background:#5B7CFA; color:white; }

button:focus-visible{ outline:none; box-shadow: 0 0 0 4px rgba(91,124,250,.18); }
input:focus-visible{ outline:none; }
textarea:focus-visible{ outline:none; }

.card, .column, button, input, textarea, select, .modal, .overview-board-header, .mini-card{
    transition: .25s cubic-bezier(.2,.8,.2,1);
}

@keyframes dropdownOpen{ from{ opacity:0; transform: translateY(-8px) scale(.96); } to{ opacity:1; transform: translateY(0) scale(1); } }

@media (max-width:1200px){
    .board-inner{ padding:24px; }
    .overview-wrap{ padding:24px; }
    .board-banner{ padding:28px; }
    .modal{ max-width:95%; }
}
@media (max-width:900px){
    .app-shell{ flex-direction:column; }
    .sidebar{
        width:100%; height:auto; position:static;
        flex-direction:row; align-items:center; flex-wrap:wrap;
        padding:14px 16px; gap:10px;
        border-right:none; border-bottom:1px solid var(--border);
    }
    .sidebar-brand{ padding:0; margin-right:auto; }
    .sidebar-brand h1{ font-size:15px; }
    .sidebar-nav{ flex-direction:row; overflow-x:auto; flex:0 1 auto; gap:6px; }
    .sidebar-nav button{ border-left:none; border-bottom:3px solid transparent; padding:8px 10px; }
    .sidebar-nav button.active{ border-bottom-color:var(--tab-color,var(--primary)); }
    .sidebar-footer{ flex-direction:row; border-top:none; margin-top:0; padding:0; gap:8px; }
    .user-badge{ width:auto; }
    .board-banner{ flex-direction:column; align-items:flex-start; }
    .board-banner h1{ font-size:26px; }
    .column{ width:290px; }
}
@media (max-width:600px){
    .board-inner{ padding:16px; }
    .overview-wrap{ padding:16px; }
    .modal{ border-radius:22px; padding:22px; }
    .modal .title-input{ font-size:24px; }
    .filter-bar input{ width:100%; }
}

.fade-in{ animation:fadeIn .25s ease; }
.scale-in{ animation:scaleIn .25s ease; }
.shadow-hover:hover{ box-shadow:var(--shadow-lg); }
.radius-xl{ border-radius:26px; }

@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
@keyframes scaleIn{ from{ opacity:0; transform:scale(.96); } to{ opacity:1; transform:scale(1); } }

body.dark{
    /* ===== PRIMARY (levemente mais clara para contraste em fundo escuro) ===== */
    --primary:#6B8CFF; --primary-hover:#839DFF; --primary-active:#4F63D2; --primary-disabled:#33406B;

    /* ===== NEUTRALS / SURFACES ===== */
    --bg:#0F1420; --surface:#1B2333; --surface-2:#212B3D; --surface-3:#2A3549;
    --surface-elevation-1: var(--surface); --surface-elevation-2: var(--surface-2); --surface-elevation-3: var(--surface-3);
    --card-bg: var(--surface);
    --border:#323F56; --border-hover:#425068; --divider:#29334A;
    --hover-bg: rgba(255,255,255,.045);
    --overlay: rgba(0,0,0,.55);

    /* ===== TEXT LEVELS ===== */
    --text:#EDF0F5; --text-secondary:#B4BECF; --text-light:#B4BECF; --text-muted:#7C8AA0;
    --text-disabled:#4A5568; --text-placeholder:#5C6B82; --text-inverse:#12151C;

    /* ===== STATES ===== */
    --success:#3DD68C; --success-bg:rgba(61,214,140,.12); --success-border:rgba(61,214,140,.35); --success-hover:#2FB874;
    --warning:#FFC773; --warning-bg:rgba(255,199,115,.14); --warning-border:rgba(255,199,115,.35); --warning-hover:#F0AE4E;
    --danger:#FF9B9B;  --danger-bg:rgba(255,107,107,.14);  --danger-border:rgba(255,107,107,.35);  --danger-hover:#FF7A7A;
    --info:#6FB1FF;    --info-bg:rgba(111,177,255,.12);    --info-border:rgba(111,177,255,.35);    --info-hover:#8FC4FF;
    --neutral:#9AA5B8; --neutral-bg:rgba(154,165,184,.10); --neutral-border:rgba(154,165,184,.28); --neutral-hover:#B7C0D1;

    /* ===== GLASS / OVERLAY ===== */
    --sidebar-bg: rgba(27,35,51,.88);
    --column-bg: rgba(255,255,255,.035);
    --glass-btn-bg: rgba(255,255,255,.08);
    --glass-btn-bg-soft: rgba(255,255,255,.05);

    /* ===== SHADOWS (mais fortes, já que sombra clara some no escuro) ===== */
    --shadow-xs: 0 1px 2px rgba(0,0,0,.3);
    --shadow-sm: 0 4px 14px rgba(0,0,0,.34);
    --shadow-md: 0 10px 26px rgba(0,0,0,.4);
    --shadow-lg: 0 20px 48px rgba(0,0,0,.5);
    --shadow-xl: 0 32px 70px rgba(0,0,0,.55);

    /* ===== OPACITY TOKENS ===== */
    --opacity-glass: .04;
    --opacity-overlay: .55;
    --opacity-hover: .045;
    --opacity-focus: .22;
    --opacity-dropdown-shadow: .45;
    --opacity-modal-shadow: .5;
    --opacity-tooltip-bg: .95;
}
body.dark .board-banner{ box-shadow: 0 10px 26px rgba(0,0,0,.35); }
body.dark .card-ghost{ box-shadow: 0 25px 55px rgba(0,0,0,.5); }

/*==================================================
    PATCH DE COMPATIBILIDADE
    (adicionado para preservar funcionalidades
    que dependiam destas classes, não incluídas
    no arquivo original)
===================================================*/

/* Indicador de seleção da etiqueta precisa ser visível (borda + centralização do ✓) */
.label-check{
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
}

/* Modo de edição de etiqueta precisa empilhar em coluna, não em linha */
.label-row-item.editing{
    flex-direction: column;
    align-items: stretch;
    cursor: default;
    background: var(--surface-2);
    border: 1px solid var(--border);
}
.label-row-item.editing:hover{ background: var(--surface-2); }

/* Botão de editar (lápis) dentro da etiqueta */
.label-edit-btn{
    all: unset;
    cursor: pointer;
    opacity: .65;
    padding: 4px 7px;
    font-size: 13px;
    border-radius: 6px;
    transition: var(--transition);
}
.label-edit-btn:hover{ opacity: 1; background: rgba(0,0,0,.08); }

/* Nome da etiqueta precisa crescer para empurrar o botão de editar para a direita */
.label-row-item .label-name{ flex: 1; }

/* Indicador de "cor padrão" no seletor de cor da coluna */
.column-menu-swatches .swatch-none{
    background: var(--surface-2);
    border: 1px solid var(--border-hover);
    position: relative;
}
.column-menu-swatches .swatch-none::after{
    content: '';
    position: absolute;
    left: 4px; right: 4px; top: 50%;
    height: 1.5px;
    background: var(--text-muted);
    transform: rotate(-45deg);
}
